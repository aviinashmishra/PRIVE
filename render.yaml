# Render Blueprint — deploy the Prive Exchange web platform + Postgres.
# In Render: New → Blueprint → point at this repo. Docs: https://render.com/docs/blueprint-spec
#
# The web service builds the root Dockerfile (multi-stage, standalone Next.js,
# non-root runner) — the root location means a manually-created Docker web service
# also builds with Render's defaults. RUN_MIGRATIONS=true makes the container apply
# db/migrations/*.sql and seed idempotently on every boot, so no separate job is needed.

services:
  - type: web
    name: prive-exchange
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prive-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: RUN_MIGRATIONS
        value: "true"
      # OTP email verification is off until SMTP is reliable here.
      # Flip to "true" to restore mandatory email authentication.
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      # Set to your Render URL (or custom domain) after the first deploy —
      # it is used in emailed password-reset links.
      - key: APP_URL
        sync: false
      # SMTP for verification/reset emails — Gmail via app password.
      # Only SMTP_PASS is entered in the Render dashboard (never committed).
      # To switch providers (Resend, Postmark, SES, Brevo), change these values.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: avimishra8354@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Prive Exchange <avimishra8354@gmail.com>
      # Override the seeded demo-user passwords in production.
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_TRADER_PASSWORD
        sync: false
      - key: SEED_SELLER_PASSWORD
        sync: false

databases:
  - name: prive-db
    plan: basic-256mb
    databaseName: prive
    user: prive
